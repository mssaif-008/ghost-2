# ============================================
# Ghost Host — Application Configuration
# ============================================

spring:
  application:
    name: ghosthost-api

  # ── Database ───────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ghosthost}
    username: ${SPRING_DATASOURCE_USERNAME:ghosthost}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none        # We use schema.sql instead
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Run schema.sql on startup ──────────────
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

# ── Server ─────────────────────────────────
server:
  port: 8081

# ── JWT ────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:default-dev-secret-change-in-production}
  expiration-ms: 86400000   # 24 hours

# ── Supabase Storage ──────────────────────
supabase:
  url: ${SUPABASE_URL:}
  service-key: ${SUPABASE_SERVICE_KEY:}
  bucket: ${SUPABASE_BUCKET:ghosthost-deployments}

# ── GitHub Actions Build Config ─────────────
github:
  pat: ${GITHUB_PAT:}
  repo: ${GITHUB_REPO:}

app:
  base-domain: ${BASE_DOMAIN:localhost}
  internal-api-key: ${INTERNAL_API_KEY:default-internal-secret}
  api-url: ${API_URL:http://localhost:8081}
