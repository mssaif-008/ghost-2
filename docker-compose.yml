version: "3.8"

# ============================================
# Ghost Host — Docker Compose (MVP)
# ============================================
# Usage:
#   1. Copy .env.example to .env and fill in values
#   2. docker-compose build
#   3. docker-compose up -d
# ============================================

services:

  # ── PostgreSQL Database ──────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ghosthost-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Spring Boot API + Worker ─────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ghosthost-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET}
      BASE_DOMAIN: ${BASE_DOMAIN}
      GITHUB_PAT: ${GITHUB_PAT}
      GITHUB_REPO: ${GITHUB_REPO}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      API_URL: ${API_URL}
  # ── Nginx Reverse Proxy ─────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ghosthost-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET}
      BASE_DOMAIN: ${BASE_DOMAIN}
      NGINX_ENVSUBST_TEMPLATE_VARS: SUPABASE_URL,SUPABASE_SERVICE_KEY,SUPABASE_BUCKET,BASE_DOMAIN
    depends_on:
      - api

volumes:
  pgdata:
