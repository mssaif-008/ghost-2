# ============================================
# Ghost Host — Nginx Configuration
# ============================================
# This config does two things:
# 1. Proxies API requests (api.mydomain.com) → Spring Boot
# 2. Serves static sites ({deploymentId}.mydomain.com) → Cloudflare R2
#
# HOW SUBDOMAIN ROUTING WORKS:
#   Browser hits: abc123.mydomain.com/index.html
#   Nginx extracts "abc123" from the Host header
#   Nginx proxies to: R2_PUBLIC_URL/deployments/abc123/index.html
# ============================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 100m;

    # ── Logging ────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'host=$host';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Resolver for dynamic proxy_pass ────────
    # Docker's internal DNS
    resolver 127.0.0.11 valid=30s;

    # ── API Server (api.mydomain.com or direct port) ──
    server {
        listen 80;
        server_name api.* localhost;

        location / {
            proxy_pass         http://api:8080;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ── Static Site Serving (*.mydomain.com → R2) ──
    server {
        listen 80 default_server;
        server_name ~^(?<deployment_id>[a-zA-Z0-9-]+)\.(.+)$;

        # ---------------------------------------------------------
        # HOW THIS WORKS:
        # 1. A request comes in for "abc123.mydomain.com/style.css"
        # 2. The regex above captures "abc123" into $deployment_id
        # 3. We proxy to R2: {R2_PUBLIC_URL}/deployments/abc123/style.css
        # 4. If the path is "/", we serve "/index.html" (SPA fallback)
        # ---------------------------------------------------------

        # Default: try to serve the file from R2
        location / {
            # Set the R2 URL — replace this with your actual R2 public URL
            # In production, use env substitution via envsubst or a startup script
            set $r2_base "R2_PUBLIC_URL_PLACEHOLDER";

            # Build the full R2 path
            set $r2_path "${r2_base}/deployments/${deployment_id}";

            # Proxy to R2
            proxy_pass $r2_path$request_uri;

            # Required headers for S3/R2
            proxy_set_header Host "";
            proxy_hide_header x-amz-id-2;
            proxy_hide_header x-amz-request-id;

            # Cache static assets
            proxy_cache_valid 200 10m;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";

            # If the file is not found, try index.html (SPA support)
            proxy_intercept_errors on;
            error_page 404 = @fallback;
        }

        # SPA fallback — serve index.html for client-side routing
        location @fallback {
            set $r2_base "R2_PUBLIC_URL_PLACEHOLDER";
            proxy_pass ${r2_base}/deployments/${deployment_id}/index.html;
            proxy_set_header Host "";
        }
    }

    # ── HTTPS Server (uncomment when you have SSL certs) ──────
    # To enable HTTPS with wildcard SSL:
    # 1. Get a wildcard cert for *.mydomain.com (Let's Encrypt / Cloudflare)
    # 2. Place cert files in /etc/nginx/certs/
    # 3. Uncomment the block below
    #
    # server {
    #     listen 443 ssl;
    #     server_name ~^(?<deployment_id>[a-zA-Z0-9-]+)\.(.+)$;
    #
    #     ssl_certificate     /etc/nginx/certs/mydomain.com.crt;
    #     ssl_certificate_key /etc/nginx/certs/mydomain.com.key;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # Same location blocks as above...
    #     location / {
    #         set $r2_base "R2_PUBLIC_URL_PLACEHOLDER";
    #         set $r2_path "${r2_base}/deployments/${deployment_id}";
    #         proxy_pass $r2_path$request_uri;
    #         proxy_set_header Host "";
    #         proxy_intercept_errors on;
    #         error_page 404 = @fallback;
    #     }
    #     location @fallback {
    #         set $r2_base "R2_PUBLIC_URL_PLACEHOLDER";
    #         proxy_pass ${r2_base}/deployments/${deployment_id}/index.html;
    #         proxy_set_header Host "";
    #     }
    # }
    #
    # # Redirect HTTP → HTTPS
    # server {
    #     listen 80;
    #     server_name *.mydomain.com;
    #     return 301 https://$host$request_uri;
    # }
}
